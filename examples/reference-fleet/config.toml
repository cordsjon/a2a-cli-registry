# Reference fleet config for a2a-cli-registry.
#
# Live keys are read by the current CLI and change runtime behavior.
# Keys under a "reserved" section are parsed-but-not-yet-consumed — the command
# that will use them is named inline. They are kept (not deleted) because they
# document the intended tuning surface; until that command lands, editing them
# has no effect.

# --- live ---
cli_audit_path = "./cli-audit/latest.json"   # path to your cli-audit JSON export

[thresholds]
mass_removal = 0.30        # live: populate refuses if >= this fraction of CLIs would be removed

# --- live ---
[probe]
probe_timeout = 10            # per-CLI health-probe wall-time budget (seconds)
max_probe_output_bytes = 65536  # cap on captured probe output (bytes)
probe_concurrency = 8        # parallel probes
staleness_ttl = 3600         # unprobeable CLI older than this reads 'stale' (seconds)

# reserved — consumed once a plan/chain command lands; see core/planner/search.py
[planner.reserved]
max_chain_depth = 4
max_candidate_chains = 100

# --- live ---
# The vocabulary is the EDGE GATE: only registered (non-"unverified:") ports
# form call-graph edges (core/vocabulary.py is_edge_eligible). LLM-inferred ports
# (bridge/enrich_feed.py) are admitted against this list at populate time —
# unregistered ones are quarantined to "unverified:" and excluded from chaining.
# This curated set covers the port families the inferer actually produces across
# the fleet (office docs, common data formats, text/url) so inferred capability
# becomes chainable. Add a family here only when CLIs demonstrably emit it.
[vocabulary]
registered = [
    # text / generic
    "text", "text:doc", "text:summary", "url", "file",
    # data formats
    "json", "json:invoice", "file:json", "file:csv", "file:yaml", "file:xml",
    # documents
    "file:pdf", "file:md", "file:html",
    # office (pptx family + spreadsheets/docs)
    "file:pptx", "file:ppsx", "file:potx", "file:xlsx", "file:docx",
    # images / media
    "image", "file:png", "file:svg",
]

[vocabulary.aliases]
pdf = "file:pdf"
PDF = "file:pdf"
csv = "file:csv"
yaml = "file:yaml"
yml = "file:yaml"
xml = "file:xml"
pptx = "file:pptx"
ppsx = "file:ppsx"
potx = "file:potx"
xlsx = "file:xlsx"
docx = "file:docx"
md = "file:md"
markdown = "file:md"
html = "file:html"
png = "file:png"
svg = "file:svg"
